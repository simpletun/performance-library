name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'index.d.ts'
      - 'types.d.ts'
      - 'package.json'
      - 'package-lock.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish
