name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
